# Build and push the custom OpenClaw agent image to Quay.io.
#
# Triggers:
#   - Push to image/ on main (tool list changed)
#   - Manual dispatch (pin to a specific upstream version)
#   - Weekly schedule (pick up upstream updates)
#
# Required repository secrets:
#   QUAY_USERNAME  — Quay.io robot account username
#   QUAY_PASSWORD  — Quay.io robot account token

name: Build Agent Image

on:
  push:
    branches: [main]
    paths:
      - "image/**"
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Upstream OpenClaw tag (e.g. 2026.7.1). Leave empty for latest."
        required: false
        default: ""
  schedule:
    # Weekly Monday 06:07 UTC — offset from :00 to avoid GitHub Actions congestion
    - cron: "7 6 * * 1"

env:
  REGISTRY: quay.io
  # TODO: change to your Quay.io organization/repository
  IMAGE_NAME: redhat-et/openclaw-agent

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Resolve upstream tag
        id: upstream
        run: |
          TAG="${{ inputs.upstream_tag }}"
          if [ -z "$TAG" ]; then
            TAG="latest"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using upstream tag: $TAG"

      - name: Generate image metadata
        id: meta
        run: |
          DATE="$(date -u +%Y%m%d)"
          UPSTREAM="${{ steps.upstream.outputs.tag }}"
          FULL="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          TAGS="${FULL}:latest"
          if [ "$UPSTREAM" != "latest" ]; then
            TAGS="${TAGS},${FULL}:${UPSTREAM},${FULL}:${UPSTREAM}-${DATE}"
          else
            TAGS="${TAGS},${FULL}:${DATE}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: image/
          file: image/Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            UPSTREAM=ghcr.io/openclaw/openclaw:${{ steps.upstream.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
